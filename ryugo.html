
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message</title>

<style>
body {
    margin:0;
    font-family: 'Helvetica Neue', sans-serif;
    background: linear-gradient(to bottom, #f7f3ef, #e8dfd6);
    text-align:center;
}

.container {
    padding:20px;
}

.card {
    background:white;
    border-radius:20px;
    padding:25px;
    max-width:600px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

h1 {
    font-size:24px;
}

p {
    white-space: pre-line;
    line-height:1.8;
}

img {
    width:100%;
    border-radius:12px;
    margin-bottom:15px;
}

.video {
    margin-top:20px;
}

iframe {
    width:100%;
    height:200px;
    border:none;
    border-radius:10px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#c8a97e;
    color:white;
    margin-top:10px;
}

#content { display:none; }

</style>


<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>


<script>
function checkPassword() {
    var input = document.getElementById("pw").value;
    if(input === "kinosaki") {
        document.getElementById("content").style.display = "block";
        document.getElementById("lock").style.display = "none";
    } else {
        alert("パスワードが違います");
    }
}

function toggleMusic() {
    var audio = document.getElementById("bgm");
    if(audio.paused){
        audio.play();
    } else {
        audio.pause();
    }
}
</script>

</head>

<body>

<div class="container">

<div id="lock">
    <h2>パスワードを入力してください</h2>
    <input type="password" id="pw"><br>
    <button onclick="checkPassword()">開く</button>
</div>

<div id="content">

<audio id="bgm" loop>
    <source src="../music/bgm.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵 BGM ON/OFF</button>

<div class="card">
    <h1>ﾘｭｳｺﾞｳさんへ</h1>

    
    <img src="../images/suzuki.jpg">
    

    <p>遠くからありがとう！また飲みに行こう！</p>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe>
    </div>

    <p>本日はお越しいただきありがとうございます。</p>
</div>

</div>

</div>

</body>
</html>
